services:
  # 1. Python Flask Backend Service
  - type: web
    name: transaction-validator-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT backend.app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12

  # 2. React Static Frontend Site
  - type: web
    name: transaction-validator-frontend
    runtime: static
    buildCommand: cd frontend && npm install --legacy-peer-deps && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_BACKEND_URL
        value: https://transaction-validator-backend.onrender.com # Replace with your deployed backend URL after first deployment




